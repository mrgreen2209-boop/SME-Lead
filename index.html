<!DOCTYPE html>
<html>
<head>
  <title>Lead Management</title>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    input, select, button { margin:5px; padding:8px; }
    table { border-collapse: collapse; width:100%; margin-top:20px; }
    th, td { border:1px solid #ccc; padding:6px; }
  </style>
</head>

<body>

<h2>📋 Lead Entry</h2>

<input id="City" placeholder="City">
<input id="Company_Name" placeholder="Company Name">
<input id="Contact_Person" placeholder="Contact Person">
<input id="Contact_No" placeholder="Contact No">
<select id="SQL_Status">
  <option>New</option>
  <option>In Process</option>
  <option>Lost</option>
</select>

<button onclick="submitLead()">Save Lead</button>

<hr>

<h2>🔍 Filter Leads</h2>
<input id="filterCity" placeholder="City">
<select id="filterStatus">
  <option value="">All</option>
  <option>New</option>
  <option>In Process</option>
  <option>Lost</option>
</select>

<button onclick="loadLeads()">Search</button>

<table id="leadTable"></table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwypdVHM9JjnT96cTamG-t4kZDvqyg-T6GwRqsDUtpZ6c5c3VD-CwHLn9GIn20i2Mv7/exec";

function submitLead() {
  const data = {
    "City": City.value,
    "Company Name": Company_Name.value,
    "Contact Person": Contact_Person.value,
    "Contact No.": Contact_No.value,
    "SQL Status": SQL_Status.value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(() => {
    alert("✅ Lead Saved");
    loadLeads();
  });
}

function loadLeads() {
  let url = API_URL + "?";
  if (filterCity.value) url += "city=" + filterCity.value + "&";
  if (filterStatus.value) url += "status=" + filterStatus.value;

  fetch(url)
    .then(r => r.json())
    .then(showTable);
}

function showTable(data) {
  if (!data.length) {
    leadTable.innerHTML = "<tr><td>No data</td></tr>";
    return;
  }

  let html = "<tr>";
  Object.keys(data[0]).forEach(h => html += `<th>${h}</th>`);
  html += "</tr>";

  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(v => html += `<td>${v || ""}</td>`);
    html += "</tr>";
  });

  leadTable.innerHTML = html;
}
</script>

</body>
</html>
