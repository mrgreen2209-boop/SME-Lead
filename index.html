<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lead CRM</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    h2 { margin-top: 30px; }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    input, select, button {
      padding: 8px;
      width: 280px;
      margin-top: 4px;
    }
    button {
      cursor: pointer;
      margin-top: 15px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 25px;
      background: #fff;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      font-size: 13px;
    }
    th { background: #eee; }
  </style>
</head>

<body>

<h2>📋 Lead Entry</h2>
<form id="leadForm"></form>
<button type="button" onclick="saveLead()">💾 Save Lead</button>

<hr>

<h2>🔍 Filter Leads</h2>

<label>City</label>
<input id="filterCity" placeholder="City">

<label>Status</label>
<select id="filterStatus">
  <option value="">All</option>
  <option>New</option>
  <option>In Process</option>
  <option>Lost</option>
</select>

<br>
<button type="button" onclick="loadLeads()">Search</button>

<table id="leadTable"></table>

<script>
/* ===============================
   CONFIG
================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbwhE_xg3fCzIa9xB0o1at2YZDS2YY67yudQfhDRfmq_FprRDsZzpqY3yR1pJXTtMCJ9/exec";

/* ===============================
   LOAD HEADERS (DUPLICATE SAFE)
================================ */
fetch(API_URL)
  .then(res => res.json())
  .then(headers => {
    const form = document.getElementById("leadForm");
    form.innerHTML = "";

    headers.forEach((header, index) => {
      form.innerHTML += `
        <label>${header}</label>
        <input type="text"
               data-header="${header}"
               placeholder="${header}">
      `;
    });
  })
  .catch(() => alert("❌ Headers load nahi hue"));

/* ===============================
   SAVE LEAD
================================ */
function saveLead() {
  const inputs = document.querySelectorAll("#leadForm input");
  let payload = {};

  inputs.forEach(input => {
    payload[input.dataset.header] = input.value;
  });

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  })
  .then(() => {
    alert("✅ Lead Saved Successfully");
    loadLeads();
  })
  .catch(() => alert("❌ Save failed"));
}

/* ===============================
   LOAD LEADS
================================ */
function loadLeads() {
  let url = API_URL + "?";
  if (filterCity.value) url += "city=" + encodeURIComponent(filterCity.value) + "&";
  if (filterStatus.value) url += "status=" + encodeURIComponent(filterStatus.value);

  fetch(url)
    .then(res => res.json())
    .then(showTable);
}

/* ===============================
   SHOW TABLE
================================ */
function showTable(data) {
  if (!data || !data.length) {
    leadTable.innerHTML = "<tr><td>No Data Found</td></tr>";
    return;
  }

  let html = "<tr>";
  Object.keys(data[0]).forEach(key => {
    html += `<th>${key}</th>`;
  });
  html += "</tr>";

  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(val => {
      html += `<td>${val || ""}</td>`;
    });
    html += "</tr>";
  });

  leadTable.innerHTML = html;
}
</script>

</body>
</html>
