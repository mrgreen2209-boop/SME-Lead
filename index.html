<!DOCTYPE html>
<html>
<head>
  <title>Lead CRM</title>
  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    label { font-weight:bold; }
    input, select, button {
      padding:8px;
      margin:6px 0;
      width:260px;
    }
    table {
      border-collapse: collapse;
      width:100%;
      margin-top:20px;
      background:#fff;
    }
    th, td {
      border:1px solid #ccc;
      padding:6px;
      font-size:13px;
    }
    th { background:#eee; }
  </style>
</head>

<body>

<h2>📋 Dynamic Lead Entry</h2>

<form id="leadForm"></form>

<!-- 🔴 IMPORTANT FIX: type="button" -->
<button type="button" onclick="submitLead()">💾 Save Lead</button>

<hr>

<h2>🔍 Filter Leads</h2>

<input id="filterCity" placeholder="City">
<select id="filterStatus">
  <option value="">All Status</option>
  <option>New</option>
  <option>In Process</option>
  <option>Lost</option>
</select>

<button type="button" onclick="loadLeads()">Search</button>

<table id="leadTable"></table>

<script>
const API_URL = "PASTE_NEW_WEB_APP_URL_HERE";

/* ---------- LOAD HEADERS ---------- */
fetch(API_URL + "?action=headers")
  .then(r => r.json())
  .then(headers => {
    const form = document.getElementById("leadForm");
    form.innerHTML = ""; // ✅ IMPORTANT

    headers.forEach(h => {
      const id = h.replace(/[^a-zA-Z0-9]/g, "_");
      form.innerHTML += `
        <label>${h}</label><br>
        <input id="${id}" placeholder="${h}"><br><br>
      `;
    });
  })
  .catch(err => alert("❌ Headers load nahi hue"));

/* ---------- SAVE LEAD ---------- */
function submitLead() {
  const inputs = document.querySelectorAll("#leadForm input");
  let data = {};

  inputs.forEach(i => {
    const key = i.previousElementSibling.innerText;
    data[key] = i.value;
  });

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(() => {
    alert("✅ Lead Saved Successfully");
    loadLeads();
  });
}

/* ---------- LOAD LEADS ---------- */
function loadLeads() {
  let url = API_URL + "?";
  if (filterCity.value) url += "city=" + filterCity.value + "&";
  if (filterStatus.value) url += "status=" + filterStatus.value;

  fetch(url)
    .then(r => r.json())
    .then(showTable);
}

/* ---------- SHOW TABLE ---------- */
function showTable(data) {
  if (!data.length) {
    leadTable.innerHTML = "<tr><td>No Data Found</td></tr>";
    return;
  }

  let html = "<tr>";
  Object.keys(data[0]).forEach(h => html += `<th>${h}</th>`);
  html += "</tr>";

  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(v => html += `<td>${v || ""}</td>`);
    html += "</tr>";
  });

  leadTable.innerHTML = html;
}
</script>

</body>
</html>
